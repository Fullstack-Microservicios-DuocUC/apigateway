spring.application.name=api-gateway
server.port=8080

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ===================================================================
# CONFIGURACIÓN DE RUTAS (SPRING CLOUD GATEWAY SERVER WEBMVC)
# ===================================================================

# 0. Usuarios / Operarios (Puerto 8081)
spring.cloud.gateway.server.webmvc.routes[0].id=usuarios-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://127.0.0.1:8081
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/v1/usuarios/**

# 1. Turnos (Puerto 8082)
spring.cloud.gateway.server.webmvc.routes[1].id=turnos-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://127.0.0.1:8082
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/v1/turnos/**

# 2. Palas (Puerto 8083)
spring.cloud.gateway.server.webmvc.routes[2].id=palas-service
spring.cloud.gateway.server.webmvc.routes[2].uri=http://127.0.0.1:8083
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/v1/palas/**

# 3. Camiones (Puerto 8084)
spring.cloud.gateway.server.webmvc.routes[3].id=camiones-service
spring.cloud.gateway.server.webmvc.routes[3].uri=http://127.0.0.1:8084
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/v1/camiones/**

# 4. Alertas / Mantención (Puerto 8085)
spring.cloud.gateway.server.webmvc.routes[4].id=alertas-service
spring.cloud.gateway.server.webmvc.routes[4].uri=http://127.0.0.1:8085
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/v1/alertas/**, /api/v1/mantencion/**

# 5. Materiales (Puerto 8086)
spring.cloud.gateway.server.webmvc.routes[5].id=materiales-service
spring.cloud.gateway.server.webmvc.routes[5].uri=