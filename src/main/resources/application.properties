spring.application.name=api-gateway
server.port=8080

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===================================================================
# CONFIGURACIÓN DE RUTAS (SPRING CLOUD GATEWAY SERVER WEBMVC)
# ===================================================================

# 1. Usuarios / Operarios (Puerto 8081)
spring.cloud.gateway.server.webmvc.routes[0].id=usuarios-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://usuarios
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/v1/usuarios/**

# 2. Turnos (Puerto 8082)
spring.cloud.gateway.server.webmvc.routes[1].id=turnos-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://turnos
